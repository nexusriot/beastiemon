# beastiemon.conf — BeastieMon daemon configuration
# Install: /usr/local/etc/beastiemon.conf  (mode 0640, owner root:_beastie)

[server]
# Address and port for the web UI and API.
# To expose on the LAN, change to "0.0.0.0:8088" or put nginx in front.
listen = "127.0.0.1:8088"

[collect]
# How often to sample metrics. Must be a valid Go duration (e.g. "1s", "500ms").
interval = "1s"

# How many seconds of 1-second-resolution history to keep in memory.
# 3600 = one full hour.  Each snapshot is ~2 KB, so 3600 ≈ 7 MB.
ring_size = 3600

# Filesystems to include in the FS usage panel.
# Comment out to include everything.
fs_include = ["/", "/var", "/usr", "/tmp"]

# Network interfaces to exclude (loopback is rarely interesting).
net_exclude = ["lo0"]
